services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  frontend:
    image: python:3.12-slim
    ports:
      - "8090:8090"
    volumes:
      - ./frontend:/srv/frontend:ro
    command: python3 -m http.server 8090 --directory /srv/frontend
    restart: unless-stopped
