<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CO2 Emission Calculator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; padding: 2rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 2rem; }
    .card { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; max-width: 900px; }
    .card h2 { font-size: 1rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
    .step-num { background: #0070f3; color: #fff; border-radius: 50%; width: 22px; height: 22px; display: inline-flex; align-items: center; justify-content: center; font-size: 0.75rem; flex-shrink: 0; }
    .step-num.done { background: #22c55e; }
    .stats { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .stat-card { background: #f8f8f8; border: 1px solid #e0e0e0; border-radius: 6px; padding: 0.6rem 1rem; min-width: 120px; text-align: center; }
    .stat-card .val { font-size: 1.3rem; font-weight: 700; color: #0070f3; }
    .stat-card .lbl { font-size: 0.75rem; color: #888; margin-top: 0.15rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 0.5rem; }
    th { text-align: left; padding: 0.4rem 0.6rem; background: #f0f0f0; border-bottom: 2px solid #ddd; }
    td { padding: 0.4rem 0.6rem; border-bottom: 1px solid #eee; }
    .total-row td { font-weight: 700; background: #f8f8f8; }
    .status-badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem; }
    .status-done { background: #22c55e; color: #fff; }
    .status-pending { background: #f59e0b; color: #fff; }
    .scope-bar { display: flex; height: 24px; border-radius: 4px; overflow: hidden; margin: 0.5rem 0; }
    .scope1 { background: #ef4444; }
    .scope2 { background: #f59e0b; }
    .scope3 { background: #3b82f6; }
    .scope-legend { display: flex; gap: 1rem; font-size: 0.75rem; margin-top: 0.5rem; }
    .scope-legend span { display: flex; align-items: center; gap: 0.25rem; }
    .scope-dot { width: 10px; height: 10px; border-radius: 50%; }
    .loading { color: #666; font-style: italic; }
    .error { color: #dc2626; }
    @media (max-width: 600px) { body { padding: 1rem; } .card { padding: 1rem; } }
  </style>
</head>
<body>
  <h1>🌍 CO2 Emission Calculator</h1>
  <p class="subtitle">会計データ・売上データから排出量を算出</p>

  <!-- Dashboard Stats -->
  <div class="card" id="card-dashboard">
    <h2>📊 Dashboard</h2>
    <div id="summaryStats" class="stats">
      <div class="loading">データ読込中...</div>
    </div>
    <div id="scopeBreakdown"></div>
  </div>

  <!-- Recent Calculations -->
  <div class="card" id="card-calculations">
    <h2>📋 算出履歴</h2>
    <div id="calculationsList" class="loading">データ読込中...</div>
  </div>

  <!-- Uploads -->
  <div class="card" id="card-uploads">
    <h2>📁 アップロード済みファイル</h2>
    <div id="uploadsList" class="loading">データ読込中...</div>
  </div>

  <script>
    const API_BASE = '';
    
    async function fetchJSON(url) {
      const res = await fetch(API_BASE + url);
      return res.json();
    }

    function formatNumber(n) {
      return n.toLocaleString('ja-JP', { maximumFractionDigits: 1 });
    }

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    }

    async function loadDashboard() {
      try {
        const summary = await fetchJSON('/api/dashboard/summary');
        document.getElementById('summaryStats').innerHTML = `
          <div class="stat-card"><div class="val">${formatNumber(summary.total_emissions_kg)}</div><div class="lbl">総排出量 (kg-CO2e)</div></div>
          <div class="stat-card"><div class="val">${formatNumber(summary.scope1_kg)}</div><div class="lbl">Scope 1</div></div>
          <div class="stat-card"><div class="val">${formatNumber(summary.scope2_kg)}</div><div class="lbl">Scope 2</div></div>
          <div class="stat-card"><div class="val">${formatNumber(summary.scope3_kg)}</div><div class="lbl">Scope 3</div></div>
          <div class="stat-card"><div class="val">${summary.total_calculations}</div><div class="lbl">算出回数</div></div>
        `;
        
        const total = summary.total_emissions_kg;
        const s1p = ((summary.scope1_kg / total) * 100).toFixed(1);
        const s2p = ((summary.scope2_kg / total) * 100).toFixed(1);
        const s3p = ((summary.scope3_kg / total) * 100).toFixed(1);
        
        document.getElementById('scopeBreakdown').innerHTML = `
          <div class="scope-bar">
            <div class="scope1" style="width:${s1p}%"></div>
            <div class="scope2" style="width:${s2p}%"></div>
            <div class="scope3" style="width:${s3p}%"></div>
          </div>
          <div class="scope-legend">
            <span><div class="scope-dot scope1"></div>Scope 1: ${formatNumber(summary.scope1_kg)}kg (${s1p}%)</span>
            <span><div class="scope-dot scope2"></div>Scope 2: ${formatNumber(summary.scope2_kg)}kg (${s2p}%)</span>
            <span><div class="scope-dot scope3"></div>Scope 3: ${formatNumber(summary.scope3_kg)}kg (${s3p}%)</span>
          </div>
        `;
      } catch (e) {
        document.getElementById('summaryStats').innerHTML = `<div class="error">エラー: ${e.message}</div>`;
      }
    }

    async function loadCalculations() {
      try {
        const calcs = await fetchJSON('/api/v1/calculations');
        let html = `<table><thead><tr><th>ID</th><th>日時</th><th>ソース</th><th>総排出量</th><th>内訳</th><th>状態</th></tr></thead><tbody>`;
        calcs.forEach(c => {
          html += `<tr>
            <td>${c.id}</td>
            <td>${formatDate(c.created_at)}</td>
            <td>${c.source_type}</td>
            <td>${formatNumber(c.grand_total_kg)} kg</td>
            <td>S1:${formatNumber(c.scope1)} / S2:${formatNumber(c.scope2)} / S3:${formatNumber(c.scope3)}</td>
            <td><span class="status-badge status-done">${c.status}</span></td>
          </tr>`;
        });
        html += `</tbody></table>`;
        document.getElementById('calculationsList').innerHTML = html;
      } catch (e) {
        document.getElementById('calculationsList').innerHTML = `<div class="error">エラー: ${e.message}</div>`;
      }
    }

    async function loadUploads() {
      try {
        const uploads = await fetchJSON('/api/v1/uploads');
        let html = `<table><thead><tr><th>ファイル名</th><th>アップロード日時</th><th>行数</th><th>状態</th></tr></thead><tbody>`;
        uploads.forEach(u => {
          html += `<tr>
            <td>${u.filename}</td>
            <td>${formatDate(u.uploaded_at)}</td>
            <td>${u.row_count}</td>
            <td><span class="status-badge status-done">${u.status}</span></td>
          </tr>`;
        });
        html += `</tbody></table>`;
        document.getElementById('uploadsList').innerHTML = html;
      } catch (e) {
        document.getElementById('uploadsList').innerHTML = `<div class="error">エラー: ${e.message}</div>`;
      }
    }

    // Load all data
    loadDashboard();
    loadCalculations();
    loadUploads();
  </script>
</body>
</html>
